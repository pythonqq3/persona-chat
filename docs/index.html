<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>张仕达的数字分身</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e1117;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
    }
    iframe {
      width: 100%; height: 100%;
      border: none;
      max-width: 900px;
    }
    .loading {
      color: #888; font-size: 18px; text-align: center; padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>
  <div id="loader" class="loading">加载中...</div>
  <iframe
    id="app"
    src="https://zhangshida.streamlit.app/?embed=true"
    style="display:none;"
    onload="document.getElementById('loader').style.display='none';this.style.display='block';"
    allow="microphone; camera"
  ></iframe>
</body>
</html>
